name: Auto Sign-In

on:
  schedule:
    - cron: '15 3 * * *'  # 每天UTC 00:00运行（可调整为您的时区）
  workflow_dispatch:  # 支持手动触发

jobs:
  sign-in:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 使用Node 20（兼容Puppeteer）

      - name: Install dependencies
        timeout-minutes: 8
        run: npm ci

      - name: Run sign-in script
        timeout-minutes: 10
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}  # 从GitHub Secrets获取
        run: node sign.js
