name: Auto Sign-In

on:
  schedule:
    - cron: '15 3 * * *'  # 每天UTC 00:00运行（可调整为您的时区）
  workflow_dispatch:  # 支持手动触发

jobs:
  sign-in:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 使用Node 20（兼容Puppeteer）

      - name: Install dependencies
        run: npm install

      - name: Install Chrome dependencies for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            fonts-liberation \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libexpat1 \
            libfontconfig1 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libstdc++6 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            wget \
            xdg-utils
          # 打印已安装的包以便调试
          dpkg -l | grep -E 'ca-certificates|fonts-liberation|libasound2t64|libatk|libcairo|libcups|libdbus|libexpat|libfontconfig|libgbm|libglib|libgtk|libnspr|libnss|libpango|libstdc|libx11|libxcb|libxcomposite|libxcursor|libxdamage|libxext|libxfixes|libxi|libxrandr|libxrender|libxss|libxtst|wget|xdg-utils'

      - name: Run sign-in script
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}  # 从GitHub Secrets获取
        run: node sign.js