name: Auto Sign-In

on:
  schedule:
    - cron: '15 3 * * *'  # 每天UTC 00:00运行（可调整为您的时区）
  workflow_dispatch:  # 支持手动触发

jobs:
  sign-in:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 使用Node 20（兼容Puppeteer）

      - name: Install dependencies
        timeout-minutes: 8
        run: npm ci

      - name: Install xvfb
        timeout-minutes: 3
        run: |
          sudo rm -f /etc/apt/sources.list.d/*azure* /etc/apt/apt-mirrors.txt || true
          sudo apt-get install -y --no-install-recommends xvfb \
            || (sudo apt-get update -o Acquire::Retries=2 -o Acquire::http::Timeout=20 \
                && sudo apt-get install -y --no-install-recommends xvfb)

      - name: Run sign-in script
        timeout-minutes: 10
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}  # 从GitHub Secrets获取
        run: xvfb-run --auto-servernum --server-args='-screen 0 1280x800x24' node sign.js
